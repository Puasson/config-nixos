# ── Autostart ─────────────────────────────────────────────────────────────────
exec-once = waybar
exec-once = swaync
exec-once = awww-daemon
exec-once = /$HOME/.config/hypr/wallpaper.sh
exec-once = nm-applet --indicator
exec-once = /run/current-system/sw/libexec/polkit-gnome-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hypridle

# ── Variables ─────────────────────────────────────────────────────────────────
$mainMod    = SUPER
$terminal   = kitty
$fileManager = nautilus
$menu       = wofi

# ── Environment variables ─────────────────────────────────────────────────────
env = XCURSOR_THEME,Vimix-cursors
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = MOZ_ENABLE_WAYLAND,1
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# ── Monitor ───────────────────────────────────────────────────────────────────
monitor = VGA-1,1600x900@60,0x0,1

# ── General ───────────────────────────────────────────────────────────────────
general {
    gaps_in    = 4
    gaps_out   = 6
    border_size = 0
    col.active_border   = rgba(4CC27Ecc) rgba(3FBA81aa) 45deg
    col.inactive_border = rgba(1D2C2A88)
    layout              = dwindle
    resize_on_border    = true
    allow_tearing       = false
}

# ── Decoration ────────────────────────────────────────────────────────────────
decoration {
    rounding         = 5
    active_opacity   = 0.9
    inactive_opacity = 0.8
}

# ── Animations ────────────────────────────────────────────────────────────────
animations {
    enabled = true

    bezier = overshot,  0.05, 0.9, 0.1, 1.05
    bezier = ease,      0.25, 0.1, 0.25, 1.0
    bezier = easeinout, 0.45, 0.0, 0.55, 1.0
    bezier = linear,    0.0,  0.0, 1.0,  1.0

    animation = windows,          1, 2, overshot, slide
    animation = windowsOut,       1, 2, ease,     popin 80%
    animation = windowsMove,      1, 2, easeinout
    animation = border,           1, 2, linear
    animation = fade,             1, 2, ease
    animation = fadeDim,          1, 2, ease
    animation = workspaces,       1, 2, overshot, slide
    animation = specialWorkspace, 1, 2, overshot, slidevert
}
# ── Input ─────────────────────────────────────────────────────────────────────
input {
    kb_layout    = latam
    follow_mouse = 1
    sensitivity  = 0
    accel_profile = flat

    touchpad {
        natural_scroll       = true
        disable_while_typing = true
        tap-to-click         = true
    }
}

# ── Layout ────────────────────────────────────────────────────────────────────
dwindle {
    preserve_split = true
    smart_split    = false
    smart_resizing = true
}

master {
    new_status = slave
}

# ── Misc ──────────────────────────────────────────────────────────────────────
misc {
    force_default_wallpaper      = 0
    disable_hyprland_logo        = true
    disable_splash_rendering     = true
    animate_manual_resizes       = true
    animate_mouse_windowdragging = true
    enable_swallow               = true
    swallow_regex                = ^(kitty)$
    focus_on_activate            = false
}

# ── Keybinds: Applications ────────────────────────────────────────────────────
bind = $mainMod, T, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, brave
bind = $mainMod, A, exec, wofi --show drun --allow-images
bind = $mainMod, C, exec, code
bind = $mainMod, N, exec, swaync-client -t -sw

# ── Keybinds: Window management ───────────────────────────────────────────────
bind = alt, Q, killactive,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, M, fullscreen, 1
bind = $mainMod SHIFT, F, togglefloating,
bind = $mainMod SHIFT, Delete, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# ── Keybinds: Focus (arrows + hjkl) ──────────────────────────────────────────
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# ── Keybinds: Move windows (arrows + hjkl) ───────────────────────────────────
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# ── Keybinds: Resize windows ──────────────────────────────────────────────────
binde = $mainMod CTRL, left,  resizeactive, -40 0
binde = $mainMod CTRL, right, resizeactive,  40 0
binde = $mainMod CTRL, up,    resizeactive,  0 -40
binde = $mainMod CTRL, down,  resizeactive,  0  40
binde = $mainMod CTRL, H, resizeactive, -40 0
binde = $mainMod CTRL, L, resizeactive,  40 0
binde = $mainMod CTRL, K, resizeactive,  0 -40
binde = $mainMod CTRL, J, resizeactive,  0  40

# ── Keybinds: Switch workspaces ───────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, Tab,       workspace, e+1
bind = $mainMod SHIFT, Tab, workspace, e-1

# ── Keybinds: Move window to workspace ───────────────────────────────────────
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ── Keybinds: Special workspace (scratchpad) ─────────────────────────────────
bind = $mainMod, S,       togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# ── Keybinds: Mouse workspace scroll + drag/resize ───────────────────────────
bind  = $mainMod, mouse_down, workspace, e+1
bind  = $mainMod, mouse_up,   workspace, e-1
bindm = $mainMod, mouse:272,  movewindow
bindm = $mainMod, mouse:273,  resizewindow

# ── Keybinds: Screenshots ─────────────────────────────────────────────────────
bind = , Print,  exec, grim ~/Pictures/captura-$(date +%Y%m%d-%H%M%S).png && notify-send -i camera-photo 'Captura' 'Guardada en ~/Imágenes'

# ── Keybinds: Audio ───────────────────────────────────────────────────────────
bindl  = , XF86AudioPlay,        exec, playerctl play-pause
bindl  = , XF86AudioNext,        exec, playerctl next
bindl  = , XF86AudioPrev,        exec, playerctl previous
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl  = , XF86Tools,            exec, tauon

# ── Keybinds: Session / lock ──────────────────────────────────────────────────
bind = $mainMod SHIFT, Escape, exec, wlogout -p layer-shell

# ── Keybinds: Waybar toggle ───────────────────────────────────────────────────
bind = SUPER, Z,         exec, pkill -SIGUSR1 waybar

